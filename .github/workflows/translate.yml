name: Translate English to Romanian (MarianMT - Long Text)

on:
  workflow_dispatch:
    inputs:
      english_text:
        description: 'English text to translate (supports very long texts)'
        required: true
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Hugging Face models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub # Default cache directory for Hugging Face models
          key: ${{ runner.os }}-huggingface-models-en-ro-v1 # Unique key for the cache
          restore-keys: |
            ${{ runner.os }}-huggingface-models-en-ro- # Fallback if specific version not found

      - name: Install dependencies
        run: |
          pip install transformers sentencepiece torch

      - name: Write input text to file
        run: |
          cat - <<END >input.txt
"${{ github.event.inputs.english_text }}"
          END
        shell: bash # Ensure bash shell is used for 'echo' to handle special characters correctly

      - name: Create and run translation script
        id: translation_step
        run: |
          # Create a Python script inline
          cat <<EOF > translate_marian.py
          from transformers import MarianMTModel, MarianTokenizer
          import sys
          import os

          def translate_text(text, source_lang, target_lang):
              model_name = f"Helsinki-NLP/opus-mt-{source_lang}-{target_lang}"
              
              tokenizer = MarianTokenizer.from_pretrained(model_name)
              model = MarianMTModel.from_pretrained(model_name)
              
              # MarianMT models often work best with a list of strings
              # For very long texts, you might need to split them into chunks
              # and translate each chunk, then concatenate.
              # However, for simplicity and to directly address the "list too long"
              # issue, we'll process the single input string first.
              # If the input text is a single very long paragraph, the model might
              # have internal sequence length limits (typically 512 tokens).
              # For true "very long texts" (e.g., entire books), you'd need
              # more sophisticated chunking and reassembly logic here.
              
              inputs = tokenizer(text, return_tensors="pt", padding=True, truncation=True)
              
              translated_tokens = model.generate(**inputs)
              
              translated_text = [tokenizer.decode(t, skip_special_tokens=True) for t in translated_tokens]
              
              return translated_text[0]

          if __name__ == "__main__":
              # Read input text from the file created by the previous step
              input_filepath = "input.txt"
              output_filepath = "translated_text.txt"

              if not os.path.exists(input_filepath):
                  print(f"Error: Input file '{input_filepath}' not found.", file=sys.stderr)
                  sys.exit(1)

              with open(input_filepath, "r", encoding="utf-8") as f:
                  english_text = f.read()

              print(f"Read {len(english_text)} characters from input.txt")
              
              romanian_translation = translate_text(english_text, "en", "ro")
              
              with open(output_filepath, "w", encoding="utf-8") as f:
                  f.write(romanian_translation)
              print(f"Translation complete. Output saved to {output_filepath}")
          EOF
          
          # Run the Python script
          python translate_marian.py

      - name: Upload translated text as artifact
        uses: actions/upload-artifact@v4
        with:
          name: romanian-translation
          path: translated_text.txt

      - name: Display translated text (for immediate feedback in logs)
        run: |
          echo "--- Translated Text ---"
          cat translated_text.txt
          echo "-----------------------"
